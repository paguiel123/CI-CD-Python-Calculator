# ---------------------------------------------------------
# CI WORKFLOW - CI/CD Python Exam
# ---------------------------------------------------------
# This workflow runs:
# 1. Tests on three versions of Python (3.8, 3.9, 3.10)
# 2. Flake8 analysis (code quality)
# 3. Pytest tests
# 4. Trivy vulnerability scan (CRITICAL + HIGH)
# ---------------------------------------------------------

name: CI   

# ---------------------------------------------------------
# Workflow triggers
# ---------------------------------------------------------
on:
  push:               # Automatic triggering
    branches:
      - main        
      - master      
  workflow_dispatch:  #  Manual triggering from GitHub Actions

# ---------------------------------------------------------
# Minimum permissions required
# ---------------------------------------------------------
permissions:
  contents: read            # read only access to repository content 
  security-events: write    # write access to pull requests
  actions: read             # No access to actions

# ---------------------------------------------------------
# Jobs definition
# ---------------------------------------------------------
jobs:

  # -------------------------------------------------------
  # First Job : TESTS
  # -------------------------------------------------------
  test:
    runs-on: ubuntu-latest  

    # Matrix: run the tests on the three Python versions
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]

    steps:

      # ------------------------------
      # First step : Code recovery
      # ------------------------------
      - name: checkout
        uses: actions/checkout@v5

      # ------------------------------
      # Second step : Python Installation
      # ------------------------------
      - name: Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # ------------------------------
      # Third Step : dependencies Installation
      # ------------------------------
      - name: dependencies
        run: |
          python -m pip install --upgrade pip   # upgrate pip
          pip install flake8 pytest             #  flake8 installation + pytest

      # ------------------------------
      # Fourth step : flake8 analysis
      # ------------------------------
      - name: flake8
        run: |
          # First run : only critical errors
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

          # Second run : counts errors but does not terminate (--exit-zero)
          flake8 . --count --exit-zero --statistics

      # ------------------------------
      # Step 5 : tests execution
      # ------------------------------
      - name: pytest
        run: pytest ressources/tests/  

  # -------------------------------------------------------
  # Second JOB : TRIVY SCAN
  # -------------------------------------------------------
  trivy-scan:
    runs-on: ubuntu-latest
    needs: test  

    steps:

      # ------------------------------
      # First step : code recovery
      # ------------------------------
      - name: checkout
        uses: actions/checkout@v5

      # ------------------------------
      # Second step : Scan Trivy
      # ------------------------------
      - name: trivy FS mode
        uses: aquasecurity/trivy-action@v0.35.0

        with:
          scan-type: fs              # Mode scan filesystem
          format: sarif              # SARIF format for GitHub Security
          output: results.sarif      # Name of the generated SARIF file
          severity: CRITICAL,HIGH    # Vulnerabilities sought

      # ------------------------------
      # Third step : Upload SARIF report
      # ------------------------------
      - name: upload
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
